name: Fire Escape Monitor

on:
  workflow_dispatch:  # Google Apps Script'ten gelen emri yakalayan kısım burası
  # GitHub'ın kendi takvimi iptal edildi, artık sadece dışarıdan tetiklenecek.

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Kütüphaneleri kur
        run: pip install -r requirements.txt

      - name: Botu çalıştır
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Repo aktif tut
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          # Önce uzak sunucudaki (senin yaptığın) değişiklikleri çek ve üzerine ekle
          git pull origin main --rebase 
          echo "$(date)" > last_run.txt
          git add last_run.txt
          git commit -m "Auto: keep alive" || echo "No changes"
          # Eğer hala çakışma varsa zorlayarak gönder
          git push origin main
